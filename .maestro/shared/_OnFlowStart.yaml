appId: ${MAESTRO_APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true

- waitForAnimationToEnd

# Handle Expo dev client "Development servers" screen (connect to Metro)
- runFlow:
    when:
      visible: "Development servers"
    commands:
      - tapOn: "http://.*:.*"
      - waitForAnimationToEnd

# Dismiss Expo developer menu by swiping it down
- runFlow:
    when:
      visible: "Continue"
    commands:
      - swipe:
          direction: DOWN
      - waitForAnimationToEnd

# Dismiss Android bottom sheet if present
- runFlow:
    when:
      platform: Android
      visible:
        id: "${MAESTRO_APP_ID}:id/bottom_sheet"
    commands:
      - swipe:
          direction: DOWN
      - waitForAnimationToEnd

# Dismiss iOS bottom sheet if present
- runFlow:
    when:
      platform: iOS
      visible:
        id: "SBSwitcherWindow:Main"
    commands:
      - swipe:
          direction: DOWN
      - waitForAnimationToEnd

# Get past the Welcome screen
- runFlow:
    when:
      visible: "Start working out"
    commands:
      - tapOn: "Start working out"
      - waitForAnimationToEnd
