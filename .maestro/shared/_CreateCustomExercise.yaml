appId: ${MAESTRO_APP_ID}
---
# Shared: fills the create-exercise form (Reps measurement, Arms muscle area,
# "Maestro Test Exercise" name), taps "Create exercise", then "Save".
# Caller must navigate to ExerciseEdit before running this flow.

- tapOn:
    id: "measurements-select"
- tapOn: "Reps"
- tapOn: "Done"
- waitForAnimationToEnd

- tapOn:
    id: "muscle-areas-select"
    retryTapIfNoChange: true
- assertVisible: "Abdominals"
- tapOn: "Arms"
- tapOn: "Done"
- waitForAnimationToEnd

- tapOn: "Name"
- inputText: "Maestro Test Exercise"
- tapOn: "Create exercise"
- waitForAnimationToEnd

- tapOn: "Save"
