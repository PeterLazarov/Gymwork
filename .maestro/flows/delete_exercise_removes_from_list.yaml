appId: ${MAESTRO_APP_ID}
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
# E2E: Deleting an exercise immediately removes it from the exercise select list.

- runFlow: ../shared/_CreateCustomExercise.yaml

- inputText: "Maestro Delete Exercise"
- tapOn: "Create exercise"

# Save the exercise
- tapOn: "Save"
- waitForAnimationToEnd
- assertVisible: "Maestro Delete Exercise"

# Navigate to ExerciseSelect via FAB → "Add exercise"
- tapOn:
    id: "add-step-fab"
- waitForAnimationToEnd
- tapOn: "Add exercise"
- waitForAnimationToEnd

# Switch to "All Exercises" tab and verify exercise is in the list
- tapOn: "All Exercises"
- assertVisible: "Maestro Delete Exercise"

# Long press the exercise to open ExerciseDetails
- longPressOn: "Maestro Delete Exercise"
- waitForAnimationToEnd
- assertVisible: "Exercise Details"

# Open menu and delete the exercise
- tapOn:
    id: "exercise-details-menu"
- tapOn: "Delete exercise"
- waitForAnimationToEnd

# Should navigate back to ExerciseSelect — verify exercise is gone
- assertVisible: "Select exercise"
- assertNotVisible: "Maestro Delete Exercise"
